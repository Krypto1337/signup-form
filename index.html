<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/style.css" />
    <script src="./js/main.js" defer></script>
    <title>Sign up</title>
  </head>
  <body>
    <div class="sidebar">
      <div class="background-image">
        <div class="logo">
          <img src="./images/logo.png" alt="Krypto Logo" />
        </div>
      </div>
    </div>
    <div class="content">
      <div class="caption">
        <p>
          This is not a real online service! You know you need something like
          this in your life to help you realize the deepest dreams. Sign up
          <em>now</em> to get started.
        </p>
        <p><br />You <em> know </em> you want to.</p>
      </div>
      <div class="signup">
        <form action="#">
          <div class="form">
            <p class="form-title">Let's do this!</p>
            <div class="input">
              <label for="FirstName">first name</label>
              <input type="text" name="FirstName" id="FirstName" required />
            </div>
            <div class="input">
              <label for="lastName">last name</label>
              <input type="text" name="LastName" id="LastName" required />
            </div>
            <div class="input">
              <label for="Email">email</label>
              <input type="email" name="Email" id="Email" required />
            </div>
            <div class="input">
              <label for="phone">phone number</label>
              <input
                type="tel"
                name="phone"
                id="phone"
                pattern="[0-9]+"
                oninvalid="this.setCustomValidity('Enter valid phone number (0-9)')"
              />
            </div>
            <div class="input">
              <label for="Password">password</label>
              <input
                type="password"
                name="Password"
                id="Password"
                class="error"
                required
              />
            </div>
            <div class="input">
              <label for="confirmPassword">confirm password</label>
              <input
                type="password"
                name="confirmPassword"
                id="Password"
                class="error"
                required
              />
            </div>
            <button class="btn" type="submit">Create Account</button>
          </div>
        </form>
        <div class="login">Already have an account? <a href="#">Log In</a></div>
      </div>
    </div>
  </body>
</html>
