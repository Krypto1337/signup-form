<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/style.css" />
    <title>Sign up</title>
  </head>
  <body>
    <div class="sidebar">
      <div class="background-image">
        <div class="logo">
          <img src="./images/logo.png" alt="Krypto Logo" />
        </div>
      </div>
    </div>
    <div class="content">
      <div class="caption">
        <p>
          This is not a real online service! You know you need something like
          this in your life to help you realize the deepest dreams. Sign up
          <em>now</em> to get started.
        </p>
        <p><br />You <em> know </em> you want to.</p>
      </div>
      <div class="signup">
        <form action="#">
          <div class="form">
            <p class="form-title">Let's do this!</p>
            <div class="input">
              <label for="FirstName">first name</label>
              <input type="text" name="FirstName" id="FirstName" />
            </div>
            <div class="input">
              <label for="lastName">last name</label>
              <input type="text" name="LastName" id="LastName" />
            </div>
            <div class="input">
              <label for="Email">email</label>
              <input type="email" name="Email" id="Email" />
            </div>
            <div class="input">
              <label for="PhoneNumber">phone number</label>
              <input type="text" name="PhoneNumber" id="PhoneNumber" />
            </div>
            <div class="input">
              <label for="Password">password</label>
              <input type="password" name="Password" id="Password" />
            </div>
            <div class="input">
              <label for="confirmPassword">confirm password</label>
              <input
                type="password"
                name="confirmPassword"
                id="confirmPassword"
              />
            </div>
            <button type="submit">Create Account</button>
          </div>
        </form>
        <div class="login">Already have an account? <a href="#">Log In</a></div>
      </div>
    </div>
  </body>
</html>
